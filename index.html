<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1320" />
    <title>elan1 — The Agentic Transformation Company | Built on Claude</title>
    <meta
      name="description"
      content="elan1 turns startups, scaleups, and enterprises into agentic organizations — number one in their field. A Claude-native suite of agentic apps, industry solutions, and end-to-end services."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://elan1.in/" />

    <!-- OpenGraph (defaults; per-route values are set at runtime by lib/seo.ts) -->
    <meta property="og:site_name" content="elan1" />
    <meta property="og:title" content="elan1 — The Agentic Transformation Company" />
    <meta
      property="og:description"
      content="Add 1. Become the one. From AI ambition to a deployed, certified result — in weeks, not quarters."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elan1.in/" />
    <meta property="og:image" content="https://elan1.in/img/about.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="elan1 — The Agentic Transformation Company" />
    <meta
      name="twitter:description"
      content="Add 1. Become the one. From AI ambition to a deployed, certified result — in weeks, not quarters."
    />
    <meta name="twitter:image" content="https://elan1.in/img/about.jpg" />

    <!-- Structured data: Organization + WebSite (served in static HTML for crawlers) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "elan1",
        "legalName": "elan1 — The Agentic Transformation Company",
        "url": "https://elan1.in",
        "logo": "https://elan1.in/favicon.svg",
        "slogan": "Add 1. Become the one.",
        "description": "The agentic transformation company. A Claude-native composable platform: agentic apps (the 1 Suite), industry solutions, and end-to-end services.",
        "email": "hello@elan1.in",
        "foundingLocation": { "@type": "Place", "name": "India" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "elan1",
        "url": "https://elan1.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://elan1.in/resources?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
